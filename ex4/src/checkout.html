<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="stylesheet" href="~/css/style.css" />
  </head>
  <body>
    <div class="container" style="padding: 32px 0 60px">
      <h1 style="font-size: 36px; margin-bottom: 12px">Checkout</h1>
      <p style="margin-bottom: 24px; color: rgba(0, 0, 0, 0.7)">
        Enter shipping details to complete your order.
      </p>

      <form class="js-checkout-form" action="#" style="max-width: 520px">
        <div style="display: grid; gap: 14px; margin-bottom: 20px">
          <label style="display: grid; gap: 6px">
            <span>Name</span>
            <input type="text" name="name" aria-label="Name" required />
          </label>

          <label style="display: grid; gap: 6px">
            <span>Email</span>
            <input type="email" name="email" aria-label="Email" required />
          </label>

          <label style="display: grid; gap: 6px">
            <span>Phone</span>
            <input type="tel" name="phone" aria-label="Phone" required />
          </label>

          <label style="display: grid; gap: 6px">
            <span>Address</span>
            <textarea
              name="address"
              rows="4"
              aria-label="Address"
              required
            ></textarea>
          </label>
        </div>

        <button type="submit">Place Order</button>
        <p class="js-checkout-message" style="margin-top: 12px"></p>
      </form>

      <nav
        aria-label="Flow navigation"
        style="display: flex; gap: 12px; margin-top: 20px"
      >
        <a href="cart.html">Previous: Cart</a>
      </nav>
    </div>

    <script type="module" src="~/js/pages/checkoutPage.js"></script>
  </body>
</html>
